name: DemoShop QA Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly regression run at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'regression'
        type: choice
        options:
          - smoke
          - regression
          - all

jobs:
  # ── Smoke Tests (fast gate) ──
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            playwright-report/
            test-results/

  # ── Full Regression (all devices) ──
  regression:
    name: Regression - ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: smoke
    if: github.event_name == 'schedule' || github.event.inputs.test_suite != 'smoke'
    strategy:
      fail-fast: false
      matrix:
        project:
          - 'Mobile Chrome'
          - 'Mobile Safari'
          - 'Mobile Safari Mini'
          - 'Tablet'
          - 'Desktop Chrome'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run regression tests - ${{ matrix.project }}
        run: npx playwright test --project='${{ matrix.project }}' --grep @regression

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/

  # ── Merge reports ──
  report:
    name: Publish Report
    runs-on: ubuntu-latest
    needs: [smoke, regression]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: all-results/smoke-results/playwright-report
